# LiteLLM Proxy Config
#
# Source files (do not edit litellm_config.built.yaml directly):
#   models.yaml            — model list (edit to add/swap models)
#   trusted_providers.yaml — OpenRouter western-only whitelist (edit to add/remove providers)
#   litellm_config.yaml    — router + general settings (this file)
#
# Build:  python3 /Volumes/macmini1/scripts/build_litellm_config.py
# Run:    litellm --config /Volumes/macmini1/config/litellm/litellm_config.built.yaml
#
# Required env vars (all in /Volumes/macmini1/config/litellm/.env):
#   ANTHROPIC_API_KEY    ← active
#   OPENAI_API_KEY       ← active
#   GOOGLE_API_KEY       ← active
#   XAI_API_KEY          ← active
#   MISTRAL_API_KEY      ← active
#   OPENROUTER_API_KEY   ← active (NVIDIA + all non-sensitive open-weight/Chinese)
#   NVIDIA_API_KEY       ← optional (get from build.nvidia.com for direct NIM inference)

# ============================================================
# ROUTER SETTINGS
# ============================================================
router_settings:
  # latency-based-routing tries fastest provider first, falls through on failure.
  # This avoids simple-shuffle randomly hitting a slow/down provider.
  routing_strategy: latency-based-routing

  # Retry across ALL deployments in the group before giving up.
  # With 5-6 providers per tier, this ensures every provider gets tried.
  num_retries: 6
  retry_after: 1

  # Short cooldown — transient errors shouldn't blacklist a provider for 5 minutes.
  # 30s is enough to skip a momentary rate limit without losing a provider long-term.
  cooldown_time: 30

  # A provider needs 2 failures in the cooldown window before being cooled down.
  # Prevents a single transient error from removing a provider.
  allowed_fails: 2

  # Cross-tier fallbacks: if ALL providers in a tier fail, fall to the next tier.
  # Sensitive stays sensitive, nonsensitive stays nonsensitive.
  fallbacks:
    - tier-opus-sensitive: ["tier-sonnet-sensitive"]
    - tier-opus-nonsensitive: ["tier-sonnet-nonsensitive"]
    - tier-sonnet-sensitive: ["tier-haiku-sensitive"]
    - tier-sonnet-nonsensitive: ["tier-haiku-nonsensitive"]

# ============================================================
# GENERAL SETTINGS
# ============================================================
general_settings:
  # master_key read from LITELLM_MASTER_KEY env var.
  # database_url read from DATABASE_URL env var (sqlite, set by stack.sh).
  # Virtual keys enable per-workflow model tier restrictions.
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  # 120s timeout — some providers (especially thinking models) take time.
  request_timeout: 120
  # Map max_tokens → max_completion_tokens for OpenAI gpt-5.4 family.
  modify_params: true
